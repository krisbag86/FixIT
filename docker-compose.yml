services:
  app:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      APP_URL: "http://localhost:3001"
      DATABASE_URL: "postgresql://fixit:fixit@postgres:5432/fixit"
      NEXTAUTH_URL: "http://localhost:3001"
      NEXTAUTH_SECRET: "dev-secret-change-me"
      EMAIL_FROM: "IT Helpdesk <it@bagietka.pl>"
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - fixit_data:/app/.data
    depends_on:
      seed:
        condition: service_completed_successfully

  migrate:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run db:migrate:deploy"
    environment:
      DATABASE_URL: "postgresql://fixit:fixit@postgres:5432/fixit"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -c "npm run db:generate && npm run db:seed"
    environment:
      DATABASE_URL: "postgresql://fixit:fixit@postgres:5432/fixit"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      migrate:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fixit
      POSTGRES_PASSWORD: fixit
      POSTGRES_DB: fixit
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fixit -d fixit"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  node_modules:
  fixit_data:
  postgres_data:
